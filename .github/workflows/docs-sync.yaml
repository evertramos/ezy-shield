name: 📃 Sync docs to site

on:
  workflow_dispatch:
  push:
    branches: [main, dev]
    paths: ['docs/content/**']

concurrency:
  group: docs-sync-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Check token configured
        run: |
          if [ -z "${{ secrets.SITE_DEPLOY_TOKEN }}" ]; then
            echo "::error::SITE_DEPLOY_TOKEN secret is not configured. Configure it with write access to ezy-shield-site repository."
            exit 1
          fi

      - name: Resolve target branch
        id: target
        run: |
          case "${GITHUB_REF_NAME}" in
            main|dev) echo "branch=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT" ;;
            *)
              echo "::error::docs-sync only runs from main or dev (got ${GITHUB_REF_NAME})"
              exit 1
              ;;
          esac

      - uses: actions/checkout@v7
        with:
          repository: evertramos/ezy-shield-site
          ref: ${{ steps.target.outputs.branch }}
          path: site
          token: ${{ secrets.SITE_DEPLOY_TOKEN }}

      - name: Sync content
        id: sync
        run: |
          SOURCE_BRANCH="${GITHUB_REF_NAME}"
          SOURCE_SHA="$(git rev-parse --short HEAD)"
          TARGET_BRANCH="${{ steps.target.outputs.branch }}"

          rsync -av --delete \
            --exclude='.vitepress/' \
            --exclude='package.json' \
            --exclude='package-lock.json' \
            --exclude='node_modules/' \
            docs/content/ site/docs/
          cd site

          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes to sync"
            exit 0
          fi

          # Capture changed files
          CHANGED=$(git diff --name-only | sed 's|^docs/||')
          FILE_COUNT=$(echo "$CHANGED" | wc -l)

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git commit -m "docs: sync from ezy-shield ${SOURCE_SHA}"

          if ! git push origin "HEAD:${TARGET_BRANCH}"; then
            echo "::error::Failed to push docs to ezy-shield-site@${TARGET_BRANCH}. Check for conflicts or permission issues with SITE_DEPLOY_TOKEN."
            exit 1
          fi

          SITE_SHA="$(git rev-parse --short HEAD)"

          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "source_branch=${SOURCE_BRANCH}" >> "$GITHUB_OUTPUT"
          echo "target_branch=${TARGET_BRANCH}" >> "$GITHUB_OUTPUT"
          echo "source_sha=${SOURCE_SHA}" >> "$GITHUB_OUTPUT"
          echo "site_sha=${SITE_SHA}" >> "$GITHUB_OUTPUT"
          echo "file_count=${FILE_COUNT}" >> "$GITHUB_OUTPUT"
          {
            echo "files<<EOF"
            echo "$CHANGED"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Job summary
        if: always()
        run: |
          if [ "${{ steps.sync.outputs.changed }}" = "true" ]; then
            cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## ✅ Docs synced to site

          | | |
          |---|---|
          | **Source** | \`ezy-shield@${{ steps.sync.outputs.source_branch }}\` (${{ steps.sync.outputs.source_sha }}) |
          | **Target** | \`ezy-shield-site@${{ steps.sync.outputs.target_branch }}\` (${{ steps.sync.outputs.site_sha }}) |
          | **Files** | ${{ steps.sync.outputs.file_count }} changed |

          <details><summary>Changed files</summary>

          \`\`\`
          ${{ steps.sync.outputs.files }}
          \`\`\`

          </details>
          EOF
          else
            cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## ℹ️ No changes to sync

          Source: \`ezy-shield@${GITHUB_REF_NAME}\` ($(git rev-parse --short HEAD))
          Docs in \`ezy-shield-site@${{ steps.target.outputs.branch }}\` are already up to date.
          EOF
          fi
