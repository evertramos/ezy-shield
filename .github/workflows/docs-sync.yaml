name: Sync docs to site

on:
  push:
    branches: [main]
    paths: ['docs/content/**']

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check token configured
        run: |
          if [ -z "${{ secrets.SITE_DEPLOY_TOKEN }}" ]; then
            echo "::error::SITE_DEPLOY_TOKEN secret is not configured. Configure it with write access to ezy-shield-site repository."
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          repository: evertramos/ezy-shield-site
          path: site
          token: ${{ secrets.SITE_DEPLOY_TOKEN }}

      - name: Sync content
        run: |
          rsync -av --delete docs/content/ site/docs/
          cd site
          if git diff --quiet; then
            echo "No changes to sync"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git commit -m "docs: sync from ezy-shield $(git -C .. rev-parse --short HEAD)"
          if ! git push; then
            echo "::error::Failed to push docs to ezy-shield-site. Check for conflicts or permission issues with SITE_DEPLOY_TOKEN."
            exit 1
          fi
