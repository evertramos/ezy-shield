name: 🏷️ Release

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
          - rc

jobs:
  tag:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.bump.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Calculate next version
        id: bump
        run: |
          BUMP="${{ inputs.bump }}"

          if [ "$BUMP" = "rc" ]; then
            # RC mode: find latest RC tag and increment, or create first RC from latest stable
            LATEST_RC=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+-rc\.[0-9]+$' | head -1)

            if [ -n "$LATEST_RC" ]; then
              # Increment existing RC: v0.1.0-rc.1 → v0.1.0-rc.2
              BASE=$(echo "$LATEST_RC" | sed 's/-rc\.[0-9]*//')
              RC_NUM=$(echo "$LATEST_RC" | sed 's/.*-rc\.//')
              RC_NUM=$((RC_NUM + 1))
              NEW_TAG="${BASE}-rc.${RC_NUM}"
            else
              # No RC exists: take latest stable and create -rc.1
              LATEST=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
              if [ -z "$LATEST" ]; then
                LATEST="v0.0.0"
              fi
              # Bump minor for the RC base (next planned release)
              MAJOR=$(echo "$LATEST" | sed 's/v//' | cut -d. -f1)
              MINOR=$(echo "$LATEST" | sed 's/v//' | cut -d. -f2)
              MINOR=$((MINOR + 1))
              NEW_TAG="v${MAJOR}.${MINOR}.0-rc.1"
            fi
          else
            # Stable release: bump major/minor/patch
            LATEST=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
            if [ -z "$LATEST" ]; then
              LATEST="v0.0.0"
            fi
            echo "Latest tag: $LATEST"

            MAJOR=$(echo "$LATEST" | sed 's/v//' | cut -d. -f1)
            MINOR=$(echo "$LATEST" | sed 's/v//' | cut -d. -f2)
            PATCH=$(echo "$LATEST" | sed 's/v//' | cut -d. -f3)

            case "$BUMP" in
              major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
              minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
              patch) PATCH=$((PATCH + 1)) ;;
            esac

            NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          fi

          echo "New tag: $NEW_TAG"
          echo "new_tag=$NEW_TAG" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.bump.outputs.new_tag }}" -m "Release ${{ steps.bump.outputs.new_tag }}"
          git push origin "${{ steps.bump.outputs.new_tag }}"

  release:
    if: |
      (github.event_name == 'workflow_dispatch' && needs.tag.result == 'success') ||
      (github.event_name == 'push' && github.actor != 'github-actions[bot]')
    needs: [tag]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ needs.tag.outputs.new_tag || github.ref }}

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build binaries
        run: |
          VERSION="${{ needs.tag.outputs.new_tag || github.ref_name }}"
          COMMIT="$(git rev-parse --short HEAD)"
          DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          LDFLAGS="-s -w -X main.version=${VERSION} -X main.commit=${COMMIT} -X main.buildDate=${DATE}"

          declare -a TARGETS=(
            "linux/amd64"
            "linux/arm64"
          )

          mkdir -p dist

          for target in "${TARGETS[@]}"; do
            GOOS="${target%/*}"
            GOARCH="${target#*/}"
            SUFFIX="${GOOS}-${GOARCH}"

            echo "Building ezyshield-${SUFFIX}..."
            CGO_ENABLED=0 GOOS=$GOOS GOARCH=$GOARCH \
              go build -trimpath -ldflags "$LDFLAGS" \
              -o "dist/ezyshield-${SUFFIX}" ./cmd/ezyshield

            echo "Building ezyshield-enforcer-${SUFFIX}..."
            CGO_ENABLED=0 GOOS=$GOOS GOARCH=$GOARCH \
              go build -trimpath -ldflags "$LDFLAGS" \
              -o "dist/ezyshield-enforcer-${SUFFIX}" ./cmd/ezyshield-enforcer
          done

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.tag.outputs.new_tag || github.ref_name }}
          generate_release_notes: true
          # Overwrite any pre-existing notes instead of appending to them,
          # so notes are not duplicated if the release already exists.
          append_body: false
          prerelease: ${{ contains(needs.tag.outputs.new_tag || github.ref_name, '-rc') || contains(needs.tag.outputs.new_tag || github.ref_name, '-alpha') || contains(needs.tag.outputs.new_tag || github.ref_name, '-beta') }}
          make_latest: ${{ !contains(needs.tag.outputs.new_tag || github.ref_name, '-rc') && !contains(needs.tag.outputs.new_tag || github.ref_name, '-alpha') && !contains(needs.tag.outputs.new_tag || github.ref_name, '-beta') }}
          files: |
            dist/ezyshield-*
            dist/checksums.txt
