name: 🏷️ Release

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
          - rc

jobs:
  tag:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.bump.outputs.new_tag }}
    steps:
      # dev is the DEFAULT branch (development). Stable releases are cut from
      # main only; rc tags may also be cut from dev — an rc is a rehearsal of
      # dev's integration state and publishes only to the "testing" package
      # suite, never to "stable".
      - name: Refuse stable bumps outside main
        if: inputs.bump != 'rc' && github.ref != 'refs/heads/main'
        run: |
          echo "::error::'${{ inputs.bump }}' releases must be dispatched from 'main' (got '${{ github.ref_name }}'). Select 'main' in the 'Use workflow from' dropdown. Only 'rc' may be cut from dev."
          exit 1

      - name: Refuse rc bumps outside dev or main
        if: inputs.bump == 'rc' && github.ref != 'refs/heads/dev' && github.ref != 'refs/heads/main'
        run: |
          echo "::error::rc releases are cut from 'dev' (or 'main'), got '${{ github.ref_name }}'."
          exit 1

      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Calculate next version
        id: bump
        run: |
          BUMP="${{ inputs.bump }}"

          if [ "$BUMP" = "rc" ]; then
            # RC mode: find latest RC tag and increment, or create first RC from latest stable
            LATEST_RC=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+-rc\.[0-9]+$' | head -1)

            if [ -n "$LATEST_RC" ]; then
              # Increment existing RC: v0.1.0-rc.1 → v0.1.0-rc.2
              BASE=$(echo "$LATEST_RC" | sed 's/-rc\.[0-9]*//')
              RC_NUM=$(echo "$LATEST_RC" | sed 's/.*-rc\.//')
              RC_NUM=$((RC_NUM + 1))
              NEW_TAG="${BASE}-rc.${RC_NUM}"
            else
              # No RC exists: take latest stable and create -rc.1
              LATEST=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
              if [ -z "$LATEST" ]; then
                LATEST="v0.0.0"
              fi
              # Bump minor for the RC base (next planned release)
              MAJOR=$(echo "$LATEST" | sed 's/v//' | cut -d. -f1)
              MINOR=$(echo "$LATEST" | sed 's/v//' | cut -d. -f2)
              MINOR=$((MINOR + 1))
              NEW_TAG="v${MAJOR}.${MINOR}.0-rc.1"
            fi
          else
            # Stable release: bump major/minor/patch
            LATEST=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
            if [ -z "$LATEST" ]; then
              LATEST="v0.0.0"
            fi
            echo "Latest tag: $LATEST"

            MAJOR=$(echo "$LATEST" | sed 's/v//' | cut -d. -f1)
            MINOR=$(echo "$LATEST" | sed 's/v//' | cut -d. -f2)
            PATCH=$(echo "$LATEST" | sed 's/v//' | cut -d. -f3)

            case "$BUMP" in
              major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
              minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
              patch) PATCH=$((PATCH + 1)) ;;
            esac

            NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          fi

          echo "New tag: $NEW_TAG"
          echo "new_tag=$NEW_TAG" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.bump.outputs.new_tag }}" -m "Release ${{ steps.bump.outputs.new_tag }}"
          git push origin "${{ steps.bump.outputs.new_tag }}"

  release:
    if: |
      (github.event_name == 'workflow_dispatch' && needs.tag.result == 'success') ||
      (github.event_name == 'push' && github.actor != 'github-actions[bot]')
    needs: [tag]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ needs.tag.outputs.new_tag || github.ref }}

      # Defence-in-depth for the push-tag path: a STABLE tag on a commit that
      # is not on main must never produce a release (covers a manual `git tag`
      # from the wrong checkout). Prerelease tags (-rc/-alpha/-beta) are
      # exempt — they may be cut from dev and only feed the "testing" package
      # suite and prerelease GitHub releases.
      - name: Verify stable tags are on main
        run: |
          TAG="${{ needs.tag.outputs.new_tag || github.ref_name }}"
          case "$TAG" in
          *-*)
            echo "prerelease tag '$TAG' — main ancestry not required (testing channel)"
            ;;
          *)
            git fetch -q origin main
            if ! git merge-base --is-ancestor HEAD origin/main; then
              echo "::error::Stable tag '$TAG' points at a commit that is not on main. Stable releases are cut from main only — merge the release PR (dev → main) first."
              exit 1
            fi
            ;;
          esac

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      # goreleaser (issues #97/#98) builds both binaries for amd64+arm64
      # (CGO off, -trimpath, ldflags version), publishes raw binaries under
      # the exact names scripts/get.sh expects, tarballs, checksums.txt, and
      # .deb/.rpm packages. rc/alpha/beta tags become prereleases and never
      # take "latest" (release.prerelease: auto in .goreleaser.yaml).
      # The same snapshot build is install-verified in containers by the
      # `packages` job in ci.yaml on every PR.
      - name: Run goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release summary
        run: |
          TAG="${{ needs.tag.outputs.new_tag || github.ref_name }}"
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/${TAG}"
          RELEASED_BY="${{ github.actor }}"
          RELEASED_AT="$(date -u +%Y-%m-%d\ %H:%M:%S\ UTC)"
          IS_PRERELEASE="${{ contains(needs.tag.outputs.new_tag || github.ref_name, '-rc') || contains(needs.tag.outputs.new_tag || github.ref_name, '-alpha') || contains(needs.tag.outputs.new_tag || github.ref_name, '-beta') }}"

          {
            echo "## 🎉 Release Summary"
            echo ""
            echo "**Version:** \`${TAG}\`"
            echo ""
            echo "**Release URL:** [${TAG}](${RELEASE_URL})"
            echo ""
            echo "**Released by:** @${RELEASED_BY}"
            echo ""
            echo "**Released at:** ${RELEASED_AT}"
            echo ""
            if [ "$IS_PRERELEASE" = "true" ]; then
              echo "**Status:** ⚠️ Pre-release"
            else
              echo "**Status:** ✅ Stable"
            fi
            echo ""
            echo "**Artifacts:**"
            echo "- ezyshield-linux-amd64"
            echo "- ezyshield-linux-arm64"
            echo "- ezyshield-enforcer-linux-amd64"
            echo "- ezyshield-enforcer-linux-arm64"
            echo "- checksums.txt"
          } >> "$GITHUB_STEP_SUMMARY"
