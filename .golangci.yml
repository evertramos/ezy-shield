version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - govet
    - errcheck
    - staticcheck
    - gosec
    - misspell
    - revive
    - unconvert
    - ineffassign
    - noctx
  settings:
    govet:
      enable-all: true
      disable:
        - fieldalignment
        - shadow
    gosec:
      severity: low
      confidence: low
    revive:
      rules:
        - name: exported
          arguments:
            - checkPrivateReceivers
            - sayRepetitiveInsteadOfStutters
  exclusions:
    rules:
      - path: "^cmd/"
        linters: [revive]
        text: "exported"

formatters:
  enable:
    - gofmt

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
