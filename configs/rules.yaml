# EzyShield built-in detection rules.
# To override, set rules_path in config.yaml; the custom file replaces these
# defaults entirely — it is not merged.
rules:
  - name: ssh_bruteforce
    description: "Repeated SSH authentication failures"
    kinds: [ssh_fail, ssh_invalid_user]
    window: 60s
    threshold: 5
    score: 85
    category: bruteforce

  - name: http_scanner
    description: "High 404 response rate — directory/endpoint scanner"
    kinds: [http_request]
    field: status
    value: "404"
    window: 60s
    threshold: 20
    score: 70
    category: scanner

  - name: http_wp_probe
    description: "WordPress login probe"
    kinds: [http_request]
    field: path
    contains: wp-login
    window: 60s
    threshold: 3
    score: 80
    category: scanner

  - name: http_xmlrpc_abuse
    description: "XML-RPC brute force (pingback/auth abuse)"
    kinds: [http_request]
    field: path
    contains: xmlrpc.php
    window: 60s
    threshold: 5
    score: 80
    category: bruteforce

  - name: http_env_probe
    description: "Sensitive file probing (.env, wp-config, etc)"
    kinds: [http_request]
    field: path
    contains_any: [.env, wp-config, .env.local, .env.production, .env.staging]
    window: 60s
    threshold: 1
    score: 90
    category: scanner

  - name: http_rce_probe
    description: "Known RCE exploit paths (zero legitimate use)"
    kinds: [http_request]
    field: path
    contains_any: [phpunit, cgi-bin, .git, .aws, actuator, admin.php, shell.php, wp-content/plugins, plugins.php, install.php, config.php, database.yml, secrets, .htaccess, package.json, composer.json, web.config, debug.log, error.log, access.log, apache2, ssh-key, private_key, id_rsa, terraform, .terraform, vault, lambda, rds, kinesis, dynamodb, s3, cloudformation]
    window: 60s
    threshold: 1
    score: 95
    category: exploit_probe

  - name: http_scanner_400
    description: "Client error responses — malformed request scanner"
    kinds: [http_request]
    field: status
    value: "400"
    window: 60s
    threshold: 10
    score: 60
    category: scanner

  - name: http_scanner_503
    description: "Service unavailable responses — application scanner"
    kinds: [http_request]
    field: status
    value: "503"
    window: 60s
    threshold: 15
    score: 65
    category: scanner

  # ── Sustained-tier rules (low & slow detection) ─────────────────────────

  - name: http_wp_probe_sustained
    description: "Sustained wp-login attempts (low & slow bruteforce)"
    kinds: [http_request]
    field: path
    contains: wp-login
    window: 3600s
    threshold: 10
    score: 75
    category: bruteforce

  - name: http_xmlrpc_sustained
    description: "Sustained xmlrpc abuse"
    kinds: [http_request]
    field: path
    contains: xmlrpc.php
    window: 3600s
    threshold: 8
    score: 75
    category: bruteforce

  - name: http_scanner_sustained
    description: "Sustained 404 scanner (directory/endpoint enumeration)"
    kinds: [http_request]
    field: status
    value: "404"
    window: 3600s
    threshold: 60
    score: 70
    category: scanner

  - name: ssh_bruteforce_sustained
    description: "Sustained SSH brute force (low & slow)"
    kinds: [ssh_fail, ssh_invalid_user]
    window: 3600s
    threshold: 15
    score: 80
    category: bruteforce
